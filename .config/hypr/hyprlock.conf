general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = /home/initsyscall/Pictures/wallpaper/Dark_Fantasy_castle.png
    blur_passes = 2
}

label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = rgba(224, 222, 244, 1.0)
    font_size = 120
    font_family = CommitMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:86400000] date +"%A, %d %B"
    color = rgba(144, 140, 170, 1.0)
    font_size = 20
    font_family = CommitMono Nerd Font
    position = 0, -65
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 260, 44
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(50, 45, 74, 1.0)
    inner_color = rgba(32, 29, 51, 0.5)
    font_color = rgba(224, 222, 244, 1.0)
    fade_on_empty = false
    placeholder_text = Enter Password
    hide_input = false
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2] ~/.config/hypr/hyprlock-media.sh
    color = rgba(144, 140, 170, 1.0)
    font_size = 16
    font_family = CommitMono Nerd Font
    position = 0, 170
    halign = center
    valign = center
}
